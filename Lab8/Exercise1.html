<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Marks Calculator</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f2f2f2;
            padding:40px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:200px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:8px;
            margin:5px 0;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #result{
            margin-top:20px;
            font-weight:bold;
            background:#f9f9f9;
            padding:10px;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Student Marks Calculator</h2>

<label>Student Name</label>
<input type="text" id="name">

<label>Roll Number</label>
<input type="text" id="roll">

<label>Subject 1 - Mathematics</label>
<input type="number" id="math">

<label>Subject 2 - Science</label>
<input type="number" id="science">

<label>Subject 3 - English</label>
<input type="number" id="english">

<label>Subject 4 - Computer</label>
<input type="number" id="computer">

<button onclick="calculateMarks()">Calculate Result</button>

<div id="result"></div>

</div>

<script src="Exercise1.js"></script>

</body>
</html>
