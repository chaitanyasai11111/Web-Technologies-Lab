<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Book Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>📚 Online Book Finder</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by title...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <button class="filter-btn" data-category="Programming">💻 Programming</button>
            <button class="filter-btn" data-category="Fiction">🛸 Fiction</button>
            <button class="filter-btn" data-category="Science">🔬 Science</button>
            
            <h3 class="mt-20">Sort By</h3>
            <button id="sortPriceBtn">💲 Price (Low to High)</button>
            <button id="sortRatingBtn">⭐ Rating (High to Low)</button>
            
            <h3 class="mt-20">Quick Links</h3>
            <button id="topRatedBtn">🔥 Top Rated Books</button>
            <button id="resetBtn">🔄 Reset / View All</button>
        </aside>

        <main class="main-content">
            <div id="resultsInfo" class="results-info">Showing All Books</div>
            <div id="bookContainer" class="book-grid">
                <!-- Books will be injected here -->
            </div>
            
            <div class="pagination">
                <button id="loadMoreBtn" class="load-more">Load More</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
